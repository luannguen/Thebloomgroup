    <!-- Nuclear Cleanup Script: Run as early as possible to fix network ERR_FAILED -->
    <script>
      (function() {
        // 1. Force unregister all Service Workers
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
              registration.unregister().then(function() {
                console.log('Service Worker unregistered successfully.');
                // Refresh if a critical asset was failing
                if (window.location.hash === '#sw-fixed') return;
                window.location.hash = 'sw-fixed';
                window.location.reload(); 
              });
            }
          });
          
          // 2. Prevent any future registrations in this session
          const originalRegister = navigator.serviceWorker.register;
          navigator.serviceWorker.register = function(url, options) {
            console.warn('Blocked Service Worker registration for:', url);
            return Promise.reject(new Error('Service Workers are disabled in this environment to prevent network errors.'));
          };
        }

        // 3. Clear all browser caches
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (let name of names) caches.delete(name);
          });
        }
      })();
    </script>

    <style>
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        background: radial-gradient(circle at center, #374fa1 0%, #005177 100%);
        font-family: 'TTT Regular', 'Roboto', sans-serif;
        color: white;
      }
      
      .splash-container {
        text-align: center;
        animation: fadeIn 0.5s ease-out;
      }
      
      .splash-logo {
        font-size: 4rem;
        font-weight: 801;
        letter-spacing: -0.05em;
        margin-bottom: 1rem;
        background: linear-gradient(to bottom, #ffffff 0%, #e2e8f0 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 10px 30px rgba(0,0,0,0.2);
        animation: pulse 2s infinite ease-in-out;
      }
      
      .splash-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top: 3px solid white;
        border-radius: 50%;
        margin: 0 auto;
        animation: spin 0.8s linear infinite;
      }
      
      .splash-text {
        margin-top: 1.5rem;
        font-size: 0.875rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        opacity: 0.8;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(0.98); }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
    </style>
    
    <!-- SEO and OG tags are handled dynamically by React Helmet in the app -->
    
    <!-- Error handler to display JavaScript errors -->
    <script>
      window.addEventListener('error', function(event) {
        // Suppress known external noise
        if (event.message && (event.message.includes('fontawesome') || event.message.includes('tailwindcss'))) {
          return true;
        }

        if (!document.getElementById('js-error-display')) {
          const errorDiv = document.createElement('div');
          errorDiv.id = 'js-error-display';
          errorDiv.style.position = 'fixed';
          errorDiv.style.top = '10px';
          errorDiv.style.left = '10px';
          errorDiv.style.right = '10px';
          errorDiv.style.backgroundColor = 'rgba(255,0,0,0.8)';
          errorDiv.style.color = 'white';
          errorDiv.style.padding = '10px';
          errorDiv.style.zIndex = '9999';
          errorDiv.style.fontFamily = 'monospace';
          errorDiv.style.fontSize = '12px';
          errorDiv.style.whiteSpace = 'pre-wrap';
          errorDiv.style.maxHeight = '200px';
          errorDiv.style.overflow = 'auto';
          document.body.appendChild(errorDiv);
        }
        const errorDisplay = document.getElementById('js-error-display');
        errorDisplay.textContent += `Error: ${event.error?.message || event.message}\nAt: ${event.filename}:${event.lineno}:${event.colno}\n\n`;
        return false;
      });
    </script>
  </head>
