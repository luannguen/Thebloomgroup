<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Việt Vinh Corp - Tổng công ty kỹ thuật điện lạnh Việt Nam</title>
    <meta name="description" content="Việt Vinh Corp - Giải pháp điện lạnh toàn diện cho mọi công trình. Uy tín, Chất lượng, Hiệu quả." />
    <meta name="author" content="Việt Vinh Corp - Tổng công ty kỹ thuật điện lạnh Việt Nam" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="http://vietvinhcorp.com/" />
    <meta property="og:title" content="Việt Vinh Corp - Tổng công ty kỹ thuật điện lạnh Việt Nam" />
    <meta property="og:description" content="Việt Vinh Corp - Giải pháp điện lạnh toàn diện cho mọi công trình. Uy tín, Chất lượng, Hiệu quả." />
    <meta property="og:image" content="/assets/svg/logo.svg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="http://vietvinhcorp.com/" />
    <meta property="twitter:title" content="Việt Vinh Corp - Tổng công ty kỹ thuật điện lạnh Việt Nam" />
    <meta property="twitter:description" content="Việt Vinh Corp - Giải pháp điện lạnh toàn diện cho mọi công trình. Uy tín, Chất lượng, Hiệu quả." />
    <meta property="twitter:image" content="/assets/svg/logo.svg" />

    <!-- Use absolute path for favicon -->
    <link rel="icon" id="dynamic-favicon" href="/assets/svg/logo.svg" />
    
    <style>
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        background: radial-gradient(circle at center, #1E40AF 0%, #1E3A8A 100%);
        font-family: system-ui, -apple-system, sans-serif;
        color: white;
      }
      
      .splash-container {
        text-align: center;
        animation: fadeIn 0.5s ease-out;
      }
      
      .splash-logo {
        font-size: 4rem;
        font-weight: 801;
        letter-spacing: -0.05em;
        margin-bottom: 1rem;
        background: linear-gradient(to bottom, #ffffff 0%, #e2e8f0 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 10px 30px rgba(0,0,0,0.2);
        animation: pulse 2s infinite ease-in-out;
      }
      
      .splash-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top: 3px solid white;
        border-radius: 50%;
        margin: 0 auto;
        animation: spin 0.8s linear infinite;
      }
      
      .splash-text {
        margin-top: 1.5rem;
        font-size: 0.875rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        opacity: 0.8;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(0.98); }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
    </style>
    
    <!-- SEO and OG tags are handled dynamically by React Helmet in the app -->
    
    <!-- Error handler to display JavaScript errors -->
    <script>
      window.addEventListener('error', function(event) {
        console.error('Error:', event.error);
        if (!document.getElementById('js-error-display')) {
          const errorDiv = document.createElement('div');
          errorDiv.id = 'js-error-display';
          errorDiv.style.position = 'fixed';
          errorDiv.style.top = '10px';
          errorDiv.style.left = '10px';
          errorDiv.style.right = '10px';
          errorDiv.style.backgroundColor = 'rgba(255,0,0,0.8)';
          errorDiv.style.color = 'white';
          errorDiv.style.padding = '10px';
          errorDiv.style.zIndex = '9999';
          errorDiv.style.fontFamily = 'monospace';
          errorDiv.style.fontSize = '12px';
          errorDiv.style.whiteSpace = 'pre-wrap';
          errorDiv.style.maxHeight = '200px';
          errorDiv.style.overflow = 'auto';
          document.body.appendChild(errorDiv);
        }
        const errorDisplay = document.getElementById('js-error-display');
        errorDisplay.textContent += `Error: ${event.error?.message || event.message}\nAt: ${event.filename}:${event.lineno}:${event.colno}\n\n`;
        return false;
      });
    </script>
  </head>

  <body>
    <div id="root">
      <div class="splash-container">
        <div class="splash-logo">VIET VINH</div>
        <div class="splash-spinner"></div>
        <div class="splash-text">Viet Vinh Corp</div>
      </div>
    </div>
    
    <!-- Fallback for older browsers -->
    <script nomodule>
      document.getElementById('root').innerHTML = 
        '<div style="padding: 20px; text-align: center;">' +
        '<h1>Browser Not Supported</h1>' +
        '<p>Your browser does not support JavaScript modules. Please upgrade to a modern browser.</p>' +
        '</div>';
    </script>
    
    <!-- External module script -->
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    
    <!-- Main application script with error handling -->
    <script type="module">
      try {
        import('/src/main.tsx')
          .catch(error => {
            console.error('Failed to load main module:', error);
            const rootElement = document.getElementById('root');
            rootElement.innerHTML = 
              '<div style="padding: 20px; text-align: center;">' +
              '<h1>Loading Error</h1>' +
              '<p>Failed to load the application. Please check browser console for details.</p>' +
              '<p style="color: red; font-family: monospace;">' + error.message + '</p>' +
              '</div>';
          });
      } catch (error) {
        console.error('Initial import error:', error);
      }
    </script>
  </body>
</html>
